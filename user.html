<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f5f5f5; }
    input { width: 80%; padding: 12px; font-size: 18px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
    button { width: 80%; padding: 14px; font-size: 18px; background: #0066cc; color: white; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    button:disabled { background: #999; cursor: not-allowed; }
    #status { margin-top: 20px; font-size: 14px; color: #666; }
    #slot-info { margin-top: 10px; font-size: 16px; font-weight: bold; color: #0066cc; }
    #leave-btn { display: none; width: 80%; padding: 14px; font-size: 18px; background: #cc0000; color: white; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Tableau On Time</h2>
  <p>名前を入力して参加してください</p>
  <input type="text" id="name" placeholder="あなたの名前">
  <button id="join-btn" onclick="start()">参加する</button>
  <button id="leave-btn" onclick="leave()">退出する</button>
  <div id="slot-info"></div>
  <div id="status">待機中...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL: "https://tableau-ontime-default-rtdb.firebaseio.com/"
});
const db = getDatabase(app);

const MAX_SLOTS = 5;
let myName = null;
let mySlot = null;
let watchId = null;

window.start = async function() {
  const name = document.getElementById("name").value.trim();
  if (!name) { alert("名前を入力してください"); return; }

  document.getElementById("status").textContent = "スロット確認中...";
  document.getElementById("join-btn").disabled = true;

  // スロット管理
  const slotsRef = ref(db, "slots");
  const snapshot = await get(slotsRef);
  const slots = snapshot.val() || {};

  // 空きスロットを探す
  let assignedSlot = null;
  for (let i = 1; i <= MAX_SLOTS; i++) {
    if (!slots[i]) {
      assignedSlot = i;
      break;
    }
  }

  if (!assignedSlot) {
    document.getElementById("status").textContent = "定員に達しています（最大5名）";
    document.getElementById("join-btn").disabled = false;
    return;
  }

  myName = name;
  mySlot = assignedSlot;

  // スロットを予約
  await set(ref(db, `slots/${mySlot}`), name);

  // UI更新
  document.getElementById("name").disabled = true;
  document.getElementById("join-btn").style.display = "none";
  document.getElementById("leave-btn").style.display = "block";
  document.getElementById("slot-info").textContent = `参加中：User${mySlot} として接続しています`;
  document.getElementById("status").textContent = "GPS取得中...";

  // GPS送信開始
  watchId = navigator.geolocation.watchPosition((pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const acc = Math.round(pos.coords.accuracy);

    set(ref(db, `users/${name}`), {
      name: name,
      lat: lat,
      lon: lon,
      accuracy: acc,
      slot: mySlot,
      timestamp: Date.now()
    });

    document.getElementById("status").textContent = `送信中 📍 精度${acc}m`;

  }, (err) => {
    document.getElementById("status").textContent = "GPSエラー: " + err.message;
  }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
}

window.leave = async function() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  if (myName) await remove(ref(db, `users/${myName}`));
  if (mySlot) await remove(ref(db, `slots/${mySlot}`));

  document.getElementById("name").disabled = false;
  document.getElementById("name").value = "";
  document.getElementById("join-btn").disabled = false;
  document.getElementById("join-btn").style.display = "block";
  document.getElementById("leave-btn").style.display = "none";
  document.getElementById("slot-info").textContent = "";
  document.getElementById("status").textContent = "待機中...";

  myName = null;
  mySlot = null;
  watchId = null;
}
</script>
</body>
</html>
