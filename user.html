<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f5f5f5; }
    input { width: 80%; padding: 12px; font-size: 18px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
    button { width: 80%; padding: 14px; font-size: 18px; background: #0066cc; color: white; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    button:disabled { background: #999; cursor: not-allowed; }
    #status { margin-top: 20px; font-size: 14px; color: #666; }
    #slot-info { margin-top: 10px; font-size: 16px; font-weight: bold; color: #0066cc; }
    #leave-btn { display: none; width: 80%; padding: 14px; font-size: 18px; background: #cc0000; color: white; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Past meets Now</h2>
  <p>Enter your name to join</p>
  <input type="text" id="name" placeholder="Your name">
  <button id="join-btn" onclick="start()">Join</button>
  <button id="leave-btn" onclick="leave()">Leave</button>
  <div id="slot-info"></div>
  <div id="status">Waiting...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL: "https://past-meets-now-default-rtdb.firebaseio.com/"
});
const db = getDatabase(app);

const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwMshpuB6BS3SIkXUvghUZ8KZgDwv2pZv3CYxviHBZ9TtEljyHZ9t5xlCjKeOUekDZfRQ/exec";
const MAX_SLOTS = 5;
let myName = null;
let mySlot = null;
let watchId = null;
let lastLat = null;
let lastLon = null;

async function writeToSheets(name, lat, lon, accuracy, slot) {
  try {
    await fetch(SHEETS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        timestamp: new Date().toISOString(),
        name: name,
        latitude: lat,
        longitude: lon,
        accuracy: accuracy,
        slot: slot
      })
    });
  } catch (e) {
    console.log("Sheets write error:", e);
  }
}

window.start = async function() {
  const name = document.getElementById("name").value.trim();
  if (!name) { alert("Please enter your name"); return; }

  document.getElementById("status").textContent = "Checking slots...";
  document.getElementById("join-btn").disabled = true;

  const slotsRef = ref(db, "slots");
  const snapshot = await get(slotsRef);
  const slots = snapshot.val() || {};

  let assignedSlot = null;
  for (let i = 1; i <= MAX_SLOTS; i++) {
    if (!slots[i]) {
      assignedSlot = i;
      break;
    }
  }

  if (!assignedSlot) {
    document.getElementById("status").textContent = "Session full (max 5 users)";
    document.getElementById("join-btn").disabled = false;
    return;
  }

  myName = name;
  mySlot = assignedSlot;

  await set(ref(db, `slots/${mySlot}`), name);

  document.getElementById("name").disabled = true;
  document.getElementById("join-btn").style.display = "none";
  document.getElementById("leave-btn").style.display = "block";
  document.getElementById("slot-info").textContent = `Connected as User${mySlot}`;
  document.getElementById("status").textContent = "Getting GPS...";

  watchId = navigator.geolocation.watchPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const acc = Math.round(pos.coords.accuracy);

    if (lat === lastLat && lon === lastLon) return;
    lastLat = lat;
    lastLon = lon;

    await set(ref(db, `users/${name}`), {
      name: name,
      lat: lat,
      lon: lon,
      accuracy: acc,
      slot: mySlot,
      timestamp: Date.now()
    });

    await writeToSheets(name, lat, lon, acc, mySlot);

    document.getElementById("status").textContent = `Sending 📍 Accuracy: ${acc}m`;

  }, (err) => {
    document.getElementById("status").textContent = "GPS Error: " + err.message;
  }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
}

window.leave = async function() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  if (myName) await remove(ref(db, `users/${myName}`));
  if (mySlot) await remove(ref(db, `slots/${mySlot}`));

  document.getElementById("name").disabled = false;
  document.getElementById("name").value = "";
  document.getElementById("join-btn").disabled = false;
  document.getElementById("join-btn").style.display = "block";
  document.getElementById("leave-btn").style.display = "none";
  document.getElementById("slot-info").textContent = "";
  document.getElementById("status").textContent = "Waiting...";

  myName = null;
  mySlot = null;
  watchId = null;
  lastLat = null;
  lastLon = null;
}
</script>
</body>
</html>
