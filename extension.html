<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="./tableau.extensions.1.latest.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <div id="status" style="font-family:sans-serif;padding:8px;font-size:12px;color:#666;">
    Initializing...
  </div>

<script>
firebase.initializeApp({
  databaseURL: "https://past-meets-now-default-rtdb.firebaseio.com/"
});
const db = firebase.database();

const slots = [
  { lat: "User1_Lat", lon: "User1_Lon", name: "User1_Name", time: "User1_Time" },
  { lat: "User2_Lat", lon: "User2_Lon", name: "User2_Name", time: "User2_Time" },
  { lat: "User3_Lat", lon: "User3_Lon", name: "User3_Name", time: "User3_Time" },
  { lat: "User4_Lat", lon: "User4_Lon", name: "User4_Name", time: "User4_Time" },
  { lat: "User5_Lat", lon: "User5_Lon", name: "User5_Name", time: "User5_Time" },
];

let pendingUsers = null;
let updateTimer = null;

async function resetSlot(params, slotIndex) {
  const slot = slots[slotIndex];
  const latParam = params.find(p => p.name === slot.lat);
  const lonParam = params.find(p => p.name === slot.lon);
  const nameParam = params.find(p => p.name === slot.name);
    const timeParam = params.find(p => p.name === slot.time);
  if (latParam) await latParam.changeValueAsync(0);
  if (lonParam) await lonParam.changeValueAsync(0);
  if (nameParam) await nameParam.changeValueAsync("");
  if (timeParam) await timeParam.changeValueAsync("");
}

async function updateTableau(users, dashboard) {
  const params = await dashboard.getParametersAsync();

  if (!users) {
    for (let i = 0; i < slots.length; i++) {
      await resetSlot(params, i);
    }
    return;
  }

  const userList = Object.values(users).sort((a, b) => (a.slot || 99) - (b.slot || 99));
  const activeSlots = new Set();

  for (let i = 0; i < userList.length && i < slots.length; i++) {
    const user = userList[i];
    const slotIndex = (user.slot || i + 1) - 1;
    if (slotIndex >= slots.length) continue;

    activeSlots.add(slotIndex);

    const slot = slots[slotIndex];
    const latParam = params.find(p => p.name === slot.lat);
    const lonParam = params.find(p => p.name === slot.lon);
    const nameParam = params.find(p => p.name === slot.name);
    const timeParam = params.find(p => p.name === slot.time);

    // リセットせず直接上書き（アイコンが消えない）
    if (latParam) await latParam.changeValueAsync(user.lat);
    if (lonParam) await lonParam.changeValueAsync(user.lon);
    if (nameParam) await nameParam.changeValueAsync(user.name);
    if (timeParam) await timeParam.changeValueAsync(new Date(user.timestamp).toLocaleTimeString());

    console.log(`Slot${slotIndex + 1} ${user.name}: lat=${user.lat}, lon=${user.lon}`);
  }

  // アクティブでないスロットのみリセット
  for (let i = 0; i < slots.length; i++) {
    if (!activeSlots.has(i)) {
      await resetSlot(params, i);
    }
  }

  document.getElementById("status").textContent =
    `Tracking... ${userList.length} user(s) connected`;
}

tableau.extensions.initializeAsync().then(async () => {
  const dashboard = tableau.extensions.dashboardContent.dashboard;
  document.getElementById("status").textContent = "Initializing...";

  // 起動時に全スロットをリセット
  const params = await dashboard.getParametersAsync();
  for (let i = 0; i < slots.length; i++) {
    await resetSlot(params, i);
  }

  document.getElementById("status").textContent = "Tracking...";

  db.ref("users").on("value", (snapshot) => {
    pendingUsers = snapshot.val();

    if (updateTimer) return;

    // 3秒に変更（Viz操作中のグルグル対策）
    updateTimer = setTimeout(async () => {
      await updateTableau(pendingUsers, dashboard);
      updateTimer = null;
    }, 3000);
  });

}).catch(err => {
  console.log("error:", err);
  document.getElementById("status").textContent = "Error: " + err;
});
</script>
</body>
</html>
