<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f5f5f5; }
    h2 { color: #333; }
    button { width: 80%; padding: 14px; font-size: 18px; background: #cc0000; color: white; border: none; border-radius: 8px; margin-top: 20px; cursor: pointer; }
    button:hover { background: #aa0000; }
    button:disabled { background: #999; cursor: not-allowed; }
    #status { margin-top: 20px; font-size: 16px; color: #666; }
  </style>
</head>
<body>
  <h2>Past meets Now - Admin Reset</h2>
  <p>Clear all users and slots from Firebase.</p>
  <button id="reset-btn" onclick="resetAll()">Reset All</button>
  <div id="status">Ready.</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL: "https://past-meets-now-default-rtdb.firebaseio.com/"
});
const db = getDatabase(app);

window.resetAll = async function() {
  const btn = document.getElementById("reset-btn");
  const status = document.getElementById("status");

  btn.disabled = true;
  status.textContent = "Resetting...";

  try {
    await remove(ref(db, "users"));
    await remove(ref(db, "slots"));
    status.textContent = "✅ Reset complete! All users and slots cleared.";
  } catch (e) {
    status.textContent = "❌ Error: " + e.message;
  }

  btn.disabled = false;
}
</script>
</body>
</html>
