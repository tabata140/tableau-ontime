<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f5f5f5; }
    button { width: 80%; padding: 14px; font-size: 18px; background: #cc0000; color: white; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    #status { margin-top: 20px; font-size: 14px; color: #666; }
  </style>
</head>
<body>
  <h2>Tableau On Time - 管理者画面</h2>
  <button onclick="resetAll()">全ユーザーをリセット</button>
  <div id="status">待機中...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL: "https://tableau-ontime-default-rtdb.firebaseio.com/"
});
const db = getDatabase(app);

window.resetAll = async function() {
  document.getElementById("status").textContent = "リセット中...";
  try {
    await remove(ref(db, "users"));
    await remove(ref(db, "slots"));
    document.getElementById("status").textContent = "✅ リセット完了！";
  } catch (e) {
    document.getElementById("status").textContent = "エラー: " + e.message;
  }
}
</script>
</body>
</html>
